name: Pre-Merge Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  core-validation:
    name: Core Validation
    uses: ./.github/workflows/pre-merge-checks-core.yml
    secrets: inherit

  quality-validation:
    name: Quality Validation
    uses: ./.github/workflows/pre-merge-checks-quality.yml
    secrets: inherit

  code-quality:
    name: Code Quality
    uses: ./.github/workflows/code-quality.yml
    secrets: inherit
