name: Pre-Merge Checks Core

on:
  workflow_call:

jobs:
  environment-validation:
    runs-on: ubuntu-latest
    name: Validate Environment Configuration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: node scripts/validate-env-example.js
      - name: Check required environment variables
        run: |
          REQUIRED_VARS=("DATABASE_URL" "SESSION_SECRET" "NEXT_PUBLIC_APP_URL" "NODE_ENV")
          MISSING_VARS=()
          for var in "${REQUIRED_VARS[@]}"; do
            if ! grep -q "^${var}=" .env.example; then MISSING_VARS+=("$var"); fi
          done
          if [ ${#MISSING_VARS[@]} -gt 0 ]; then
            echo "❌ Missing required variables in .env.example:"; printf '%s\n' "${MISSING_VARS[@]}"; exit 1
          fi
          echo "✅ All required environment variables present in .env.example"

  database-setup-validation:
    runs-on: ubuntu-latest
    name: Validate Database Setup
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: ewtcs_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: [5432:5432]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Create test environment file
        run: |
          cat > .env.local << EOF
          DATABASE_URL=postgresql://postgres:testpassword@localhost:5432/ewtcs_test
          SESSION_SECRET=test-secret-key-minimum-32-characters-long-for-testing
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          NODE_ENV=development
          RED_ALERT_THRESHOLD_MS=10800000
          EOF
      - run: node scripts/validate-db-connection.js
      - run: npm run db:migrate
      - run: node scripts/validate-migrations.js
      - run: node scripts/validate-db-schema.js
      - name: Seed base data (users, beds, stages) required by perf seed
        run: npm run init && npm run db:seed
      - name: Seed realistic performance volume
        env:
          PERF_TARGET_BEDS: 120
          PERF_LOGS_PER_BED: 200
          PERF_MAX_DAYS_BACK: 14
        run: npm run perf:seed
      - name: Performance regression gate (p95 SLA)
        env:
          PERF_MIN_BEDS: 100
          PERF_MIN_LOGS: 20000
          PERF_WARMUP_RUNS: 5
          PERF_MEASURE_RUNS: 30
        run: npm run perf:check
      - name: Test database rollback
        run: |
          npm run db:rollback
          npm run db:migrate

  migration-validation:
    runs-on: ubuntu-latest
    name: Validate Migration Files
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for new or modified migrations
        run: |
          CHANGED_MIGRATIONS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^migrations/' || true)
          if [ -z "$CHANGED_MIGRATIONS" ]; then echo "ℹ️  No migration files changed in this PR"; exit 0; fi
          MODIFIED_MIGRATIONS=$(echo "$CHANGED_MIGRATIONS" | grep -v "$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD | grep '^migrations/')" || true)
          if [ -n "$MODIFIED_MIGRATIONS" ]; then
            echo "❌ ERROR: Existing migration files were modified!"; echo "$MODIFIED_MIGRATIONS"; exit 1
          fi
      - name: Validate migration file naming
        run: |
          shopt -s nullglob
          for file in migrations/*.sql migrations/*.js migrations/*.ts; do
            if [ -f "$file" ] && ! [[ "$(basename "$file")" =~ ^[0-9] ]]; then
              echo "❌ Invalid migration filename: $(basename "$file")"; exit 1
            fi
          done
      - name: Check for migration conflicts
        run: |
          # Only check migrations that are NEW in this PR (--diff-filter=A = Added only).
          # Pre-existing duplicates in main are a separate concern and must be fixed
          # in a dedicated migration-cleanup PR; failing every unrelated PR on them
          # is a false positive that blocks all other work.
          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD | grep '^migrations/' | xargs -n1 basename 2>/dev/null || true)
          if [ -z "$NEW_MIGRATIONS" ]; then echo "ℹ️  No new migration files in this PR — skipping conflict check"; exit 0; fi
          ALL_MIGRATION_FILES=$(ls migrations/*.sql migrations/*.js migrations/*.ts 2>/dev/null | xargs -n1 basename | sort)
          PREFIXES=$(echo "$ALL_MIGRATION_FILES" | sed 's/_.*$//' | sort)
          DUPLICATES=$(echo "$PREFIXES" | uniq -d)
          if [ -n "$DUPLICATES" ]; then
            # Only fail if one of the duplicates was introduced by this PR
            NEW_PREFIXES=$(echo "$NEW_MIGRATIONS" | sed 's/_.*$//' | sort)
            NEW_DUPLICATES=$(comm -12 <(echo "$DUPLICATES") <(echo "$NEW_PREFIXES"))
            if [ -n "$NEW_DUPLICATES" ]; then
              echo "❌ This PR introduces duplicate migration numbers:"; echo "$NEW_DUPLICATES"; exit 1
            fi
            echo "⚠️  Pre-existing duplicate migration numbers in main (not introduced by this PR): $DUPLICATES"
          fi

  build-validation:
    runs-on: ubuntu-latest
    name: Validate Build Process
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Create minimal .env.local for build
        run: |
          cat > .env.local << EOF
          DATABASE_URL=postgresql://postgres:password@localhost:5432/ewtcs
          SESSION_SECRET=build-test-secret-key-minimum-32-characters-long
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          NODE_ENV=production
          EOF
      - run: npx tsc --noEmit
      - run: npm run build
      - run: |
          if [ ! -d ".next" ]; then echo "❌ Build output directory (.next) not found"; exit 1; fi

  recovery-reliability-validation:
    runs-on: ubuntu-latest
    name: Validate Recovery & Reliability Tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run recovery and network-failure simulation tests
        run: |
          npm test -- \
            src/shared/lib/recovery-draft.test.ts \
            src/shared/hooks/useRecoveryDraftForm.test.tsx \
            src/features/stage-management/components/StageFormModal.test.tsx \
            src/features/stage-management/components/GlobalThresholdForm.test.tsx \
            src/features/bed-management/components/EditBedDialog.test.tsx \
            src/features/bed-dashboard/__tests__/execute-stage-update.reliability.test.ts

  automated-tests-validation:
    runs-on: ubuntu-latest
    name: Validate Full Automated Test Suite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test