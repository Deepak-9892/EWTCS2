# EWTCS Security Audit Workflow
# EPIC 17: Security & Privacy
# Runs weekly + on every PR to catch vulnerabilities

name: Security Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9 AM
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Save audit report
        run: npm audit --json > audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: audit-report.json
          retention-days: 30

      - name: Fail on critical vulnerabilities
        run: |
          CRITICAL=$(npm audit --json 2>/dev/null | node -e "
            let d='';
            process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try {
                const a=JSON.parse(d);
                console.log(a.metadata?.vulnerabilities?.critical||0);
              } catch(e){ console.log(0); }
            });
          ")
          echo "Critical vulnerabilities found: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "❌ Critical vulnerabilities! Fix before merging."
            exit 1
          else
            echo "✅ No critical vulnerabilities found."
          fi

  # dependency-review requires GitHub Advanced Security (GHAS / GitHub Enterprise).
  # Vulnerability scanning is already covered by the security-audit job above
  # via `npm audit --audit-level=high`. Enable this job only if GHAS is activated
  # for this repository.
