name: Code Quality Checks

on:
  workflow_call:

jobs:
  file-size-check:
    runs-on: ubuntu-latest
    name: Check File Size Limit (200 lines)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check for files exceeding 200 lines
        run: |
          echo "🔍 Checking for files exceeding 200 lines..."
          echo ""
          
          # Get list of changed files in this PR
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          
          # Initialize flag
          VIOLATION_FOUND=0
          
          # Files to exclude from check
          EXCLUDE_PATTERNS=(
            "package-lock.json"
            "yarn.lock"
            "pnpm-lock.yaml"
            "*.md"
            "*.json"
            "*.svg"
            "*.png"
            "*.jpg"
            "*.jpeg"
            "*.gif"
            "*.ico"
            "*.txt"
            "*.log"
            ".github/*"
          )
          
          # Function to check if file should be excluded
          should_exclude() {
            local file=$1
            local basename
            basename=$(basename "$file")
            for pattern in "${EXCLUDE_PATTERNS[@]}"; do
              # Match against full path (e.g. .github/*) AND basename (e.g. *.md)
              case "$file" in
                $pattern) return 0 ;;
              esac
              case "$basename" in
                $pattern) return 0 ;;
              esac
            done
            return 1
          }
          
          echo "📝 Changed files in this PR:"
          echo "$CHANGED_FILES"
          echo ""
          
          # Check each changed file
          while IFS= read -r file; do
            # Skip if file doesn't exist (deleted files)
            if [ ! -f "$file" ]; then
              continue
            fi
            
            # Skip excluded files
            if should_exclude "$file"; then
              echo "⏭️  Skipping $file (excluded)"
              continue
            fi
            
            # Count lines
            LINE_COUNT=$(wc -l < "$file" | tr -d ' ')
            
            if [ "$LINE_COUNT" -gt 200 ]; then
              echo "❌ VIOLATION: $file has $LINE_COUNT lines (max 200)"
              VIOLATION_FOUND=1
            else
              echo "✅ $file has $LINE_COUNT lines"
            fi
          done <<< "$CHANGED_FILES"
          
          echo ""
          
          if [ $VIOLATION_FOUND -eq 1 ]; then
            echo "::error::❌ One or more files exceed the 200-line limit"
            echo ""
            echo "Please split large files into smaller modules:"
            echo "  • Break down large components into smaller ones"
            echo "  • Extract utility functions into separate files"
            echo "  • Separate types into their own files"
            echo ""
            exit 1
          else
            echo "✅ All files are within the 200-line limit!"
          fi
