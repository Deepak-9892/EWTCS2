name: Daily AI Summary — Midnight Aggregation

# Runs every day at 18:30 UTC = 00:00 IST (UTC+5:30)
# Can also be triggered manually from GitHub → Actions tab.

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to aggregate (YYYY-MM-DD). Defaults to yesterday.'
        required: false
        default: ''

# ──────────────────────────────────────────────────────────────────
# Required GitHub Repository Secret (Settings → Secrets → Actions):
#   DATABASE_URL  — PostgreSQL connection string, e.g.:
#                   postgresql://user:password@host:5432/dbname
# Without this secret the job will fail at the "Run daily aggregation" step.
# ──────────────────────────────────────────────────────────────────

jobs:
  aggregate:
    name: Aggregate daily bed statistics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run daily aggregation
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            node scripts/daily-summary-cron.mjs "$DATE_ARG"
          else
            node scripts/daily-summary-cron.mjs
          fi

      - name: Report result
        if: failure()
        run: echo "❌ Daily summary aggregation failed. Check logs above."
