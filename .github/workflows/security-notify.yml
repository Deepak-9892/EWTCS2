name: Security Scan Notifications

on:
  workflow_run:
    workflows: ['Enhanced Security Scan']
    types: [completed]
  workflow_dispatch:
    inputs:
      scan_severity:
        description: 'Severity level'
        required: true
        default: 'high'
        type: choice
        options:
          - critical
          - high
          - medium

permissions:
  contents: read
  artifacts: read

jobs:
  check-results:
    name: Check Scan Results
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'skipped'
    outputs:
      has_vulnerabilities: ${{ steps.check.outputs.has_vulnerabilities }}
      critical_count: ${{ steps.check.outputs.critical_count }}
      severity_level: ${{ steps.check.outputs.severity_level }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Check vulnerability results
        id: check
        run: |
          if [ ! -f "audit-report.json" ]; then
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CRITICAL=$(jq -r '.metadata.vulnerabilities.critical // 0' audit-report.json)
          HIGH=$(jq -r '.metadata.vulnerabilities.high // 0' audit-report.json)
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
            echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT
            echo "severity_level=critical" >> $GITHUB_OUTPUT
          elif [ "$HIGH" -gt 0 ]; then
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
            echo "critical_count=$HIGH" >> $GITHUB_OUTPUT
            echo "severity_level=high" >> $GITHUB_OUTPUT
          else
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          fi

  notify-slack:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: check-results
    if: needs.check-results.outputs.has_vulnerabilities == 'true' && secrets.SLACK_WEBHOOK_URL != ''

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Prepare Slack message
        id: prepare
        run: |
          CRITICAL=$(jq -r '.metadata.vulnerabilities.critical // 0' audit-report.json)
          HIGH=$(jq -r '.metadata.vulnerabilities.high // 0' audit-report.json)
          
          if [ "$CRITICAL" -gt 0 ]; then
            COLOR="danger"
            TEXT="🚨 CRITICAL: $CRITICAL critical vulnerabilities found!"
          else
            COLOR="warning"
            TEXT="⚠️ WARNING: $HIGH high-severity vulnerabilities found!"
          fi
          
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "text=$TEXT" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "${{ steps.prepare.outputs.text }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🔒 Security Scan Alert"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.prepare.outputs.text }}\n*Action Required:* Review and prioritize fixes"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Scan"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

