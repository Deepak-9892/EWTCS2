name: Enhanced Security Scan

on:
  schedule:
    # Every Monday at 00:00 UTC (18:30 IST Sunday)
    - cron: '0 0 * * 1'
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  SCAN_DATE: ${{ github.event.repository.updated_at }}

jobs:
  scan:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    outputs:
      scan_id: ${{ steps.scan.outputs.scan_id }}
      critical_count: ${{ steps.scan.outputs.critical }}
      high_count: ${{ steps.scan.outputs.high }}
      has_critical: ${{ steps.scan.outputs.has_critical }}
      report_file: ${{ steps.scan.outputs.report_file }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: scan
        run: |
          set +e
          npm audit --json > audit-report.json
          EXIT_CODE=$?
          
          # Generate scan ID
          SCAN_ID="scan-$(date +%Y%m%d-%H%M%S)"
          echo "scan_id=$SCAN_ID" >> $GITHUB_OUTPUT
          
          # Parse report
          CRITICAL=$(jq -r '.metadata.vulnerabilities.critical // 0' audit-report.json)
          HIGH=$(jq -r '.metadata.vulnerabilities.high // 0' audit-report.json)
          MEDIUM=$(jq -r '.metadata.vulnerabilities.medium // 0' audit-report.json)
          LOW=$(jq -r '.metadata.vulnerabilities.low // 0' audit-report.json)
          TOTAL=$(jq -r '.metadata.vulnerabilities.total // 0' audit-report.json)
          
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
          echo "low=$LOW" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "report_file=audit-report.json" >> $GITHUB_OUTPUT
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "has_critical=true" >> $GITHUB_OUTPUT
          else
            echo "has_critical=false" >> $GITHUB_OUTPUT
          fi
          
          # Display summary
          echo "📊 Vulnerability Summary:"
          echo "  🔴 Critical: $CRITICAL"
          echo "  🟠 High: $HIGH"
          echo "  🟡 Medium: $MEDIUM"
          echo "  🟢 Low: $LOW"
          echo "  📈 Total: $TOTAL"
          
          exit 0

      - name: Check for outdated packages
        id: outdated
        run: |
          npm outdated --json > outdated-report.json || true
          OUTDATED_COUNT=$(jq 'length' outdated-report.json || echo "0")
          echo "outdated_count=$OUTDATED_COUNT" >> $GITHUB_OUTPUT
          echo "Found $OUTDATED_COUNT outdated packages"

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports-${{ steps.scan.outputs.scan_id }}
          path: |
            audit-report.json
            outdated-report.json
          retention-days: 90

      - name: Archive to scan history
        if: github.event_name == 'schedule'
        run: |
          mkdir -p .security-scan-archive
          cp audit-report.json ".security-scan-archive/scan-$(date +%Y-%m-%d).json"
          echo "✅ Scan archived to history"

      - name: Create GitHub Issue for critical vulns
        if: steps.scan.outputs.has_critical == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
            const critical = report.metadata.vulnerabilities.critical;
            
            const body = `🚨 **CRITICAL SECURITY ALERT**

**${critical} CRITICAL vulnerability(ies) detected!**

Scan Date: ${new Date().toISOString()}
Status: REQUIRES IMMEDIATE ACTION

## Summary
- 🔴 Critical: ${critical}
- 🟠 High: ${report.metadata.vulnerabilities.high}
- 🟡 Medium: ${report.metadata.vulnerabilities.medium}
- 🟢 Low: ${report.metadata.vulnerabilities.low}

## Action Items
1. ⚠️ Fix critical vulnerabilities within **48 hours**
2. Review the detailed scan report
3. Run \`npm audit fix\` to attempt auto-fixes
4. Monitor SLA deadlines
5. Update this issue with fix status

## Details
[See artifact for full scan report]

_[Auto-generated by EWTCS Security Scanning]_`;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 CRITICAL: ${critical} Critical Vulnerabilities Found`,
              body: body,
              labels: ['security', 'critical', 'automated'],
            });
            
            console.log(`Created issue #${issue.data.number}`);

      - name: Comment on PR with scan results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
            const meta = report.metadata.vulnerabilities;
            
            const status = meta.critical > 0 ? '❌ FAIL' : meta.high > 0 ? '⚠️ WARNING' : '✅ PASS';
            
            const body = `## 🔒 Security Scan Results

${status}

| Severity | Count |
|----------|-------|
| 🔴 Critical | ${meta.critical} |
| 🟠 High | ${meta.high} |
| 🟡 Medium | ${meta.medium} |
| 🟢 Low | ${meta.low} |
| **Total** | **${meta.total}** |

${meta.critical > 0 ? '⚠️ **This PR cannot be merged with critical vulnerabilities!**' : '✅ No critical vulnerabilities detected.'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Fail on critical vulnerabilities
        if: steps.scan.outputs.has_critical == 'true' && github.event_name == 'pull_request'
        run: |
          echo "❌ PR contains critical vulnerabilities!"
          echo "Fix critical issues before merging."
          exit 1
