version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: '/'
    reviewers:
      - 'somuyakhandelwal'
    assignees:
      - 'somuyakhandelwal'
    labels:
      - 'dependencies'
      - 'automated'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    rebase-strategy: 'auto'
    allow:
      - dependency-type: 'all'
    ignore:
      # Ignore major version updates (require manual review)
      - dependency-name: 'next'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'typescript'
        update-types:
          - 'version-update:semver-major'

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
    open-pull-requests-limit: 5
    labels:
      - 'ci'
      - 'automated'
    reviewers:
      - 'somuyakhandelwal'
    commit-message:
      prefix: 'ci'
      include: 'scope'
